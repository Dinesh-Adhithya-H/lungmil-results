<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>LungMIL Explorer</title>
  <style>
    body{font-family:sans-serif;background:#0d1117;color:#c9d1d9;display:flex;
         align-items:center;justify-content:center;height:100vh;margin:0;flex-direction:column}
    a{color:#58a6ff;font-size:1.1em;word-break:break-all;display:block;margin:12px 0}
    p{margin:8px 0}
    .small{font-size:.8em;color:#8b949e}
    button{background:#238636;color:#fff;border:none;padding:10px 24px;
           border-radius:6px;font-size:1em;cursor:pointer;margin-top:12px}
  </style>
</head>
<body>
  <div style="text-align:center;max-width:600px;padding:2rem">
    <h2 style="color:#58a6ff;margin-bottom:4px">🫁 LungMIL Explorer</h2>
    <p class="small">Password: <code style="background:#161b22;padding:2px 6px;border-radius:4px">lungmil2024</code></p>
    <div id="content">
      <p class="small" style="margin-top:16px">Loading current URL...</p>
    </div>
  </div>
  <script>
    fetch('redirect_url.txt?t=' + Date.now(), {cache: 'no-store'})
      .then(r => r.text())
      .then(url => {
        url = url.trim();
        var d = document.getElementById('content');
        d.innerHTML = '<a href="' + url + '">' + url + '</a>' +
          '<button onclick="window.location.href=\'' + url + '\'">Open App →</button>';
        window.location.replace(url);
      })
      .catch(function(e) {
        document.getElementById('content').innerHTML =
          '<p style="color:#f78166">Could not load URL. Try refreshing.</p>';
      });
  </script>
</body>
</html>
