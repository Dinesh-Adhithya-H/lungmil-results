<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>LungMIL Explorer</title>
  <style>
    body{font-family:sans-serif;background:#0d1117;color:#c9d1d9;display:flex;
         align-items:center;justify-content:center;height:100vh;margin:0;flex-direction:column}
    a{color:#58a6ff;font-size:1.1em;word-break:break-all}
    p{margin:8px 0}
    .small{font-size:.8em;color:#8b949e}
  </style>
</head>
<body>
  <div style="text-align:center;max-width:600px;padding:2rem">
    <p>Connecting to <strong>LungMIL Explorer</strong>...</p>
    <p id="url-line"></p>
    <p class="small">Password: lungmil2024</p>
    <p class="small" id="status">Fetching current URL...</p>
  </div>
  <script>
    fetch('redirect_url.txt?t=' + Date.now())
      .then(r => r.text())
      .then(url => {
        url = url.trim();
        document.getElementById('url-line').innerHTML =
          '<a href="' + url + '">' + url + '</a>';
        document.getElementById('status').textContent = 'Redirecting...';
        window.location.replace(url);
      })
      .catch(() => {
        document.getElementById('status').textContent =
          'Could not fetch URL. Try refreshing.';
      });
  </script>
</body>
</html>
